version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signalr-chat-backend
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signalr-chat-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
